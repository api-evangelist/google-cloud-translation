aid: google-cloud-translation
name: Google Cloud Translation
description: >-
  Google Cloud Translation API enables dynamic translation of text between thousands of language pairs. It supports both
  basic translation using pre-trained Neural Machine Translation models and advanced translation with custom models and
  glossaries for domain-specific terminology.
