naftiko: 1.0.0-alpha2
info:
  label: Google Cloud Translation API
  description: Dynamically translates text between thousands of language pairs using Google's Neural Machine Translation technology.
  tags:
  - Google
  - Cloud
  - Translation
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google-cloud-translation
    baseUri: https://translation.googleapis.com/v3
    description: Google Cloud Translation API HTTP API.
    resources:
    - name: projects-projectid-locations-location-translatet
      path: /projects/{projectId}/locations/{location}:translateText
      operations:
      - name: translatetext
        method: POST
        description: Google Cloud Translation Translate text
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-projectid-locations-location-detectlang
      path: /projects/{projectId}/locations/{location}:detectLanguage
      operations:
      - name: detectlanguage
        method: POST
        description: Google Cloud Translation Detect language
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-projectid-locations-location-supportedl
      path: /projects/{projectId}/locations/{location}/supportedLanguages
      operations:
      - name: getsupportedlanguages
        method: GET
        description: Google Cloud Translation Get supported languages
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: displayLanguageCode
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-projectid-locations-location-glossaries
      path: /projects/{projectId}/locations/{location}/glossaries
      operations:
      - name: listglossaries
        method: GET
        description: Google Cloud Translation List glossaries
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createglossary
        method: POST
        description: Google Cloud Translation Create a glossary
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: google-cloud-translation-rest
    description: REST adapter for Google Cloud Translation API.
    resources:
    - path: /projects/{projectId}/locations/{location}:translateText
      name: translatetext
      operations:
      - method: POST
        name: translatetext
        description: Google Cloud Translation Translate text
        call: google-cloud-translation.translatetext
        with:
          projectId: rest.projectId
          location: rest.location
        outputParameters:
        - type: object
          mapping: $.
    - path: /projects/{projectId}/locations/{location}:detectLanguage
      name: detectlanguage
      operations:
      - method: POST
        name: detectlanguage
        description: Google Cloud Translation Detect language
        call: google-cloud-translation.detectlanguage
        with:
          projectId: rest.projectId
          location: rest.location
        outputParameters:
        - type: object
          mapping: $.
    - path: /projects/{projectId}/locations/{location}/supportedLanguages
      name: getsupportedlanguages
      operations:
      - method: GET
        name: getsupportedlanguages
        description: Google Cloud Translation Get supported languages
        call: google-cloud-translation.getsupportedlanguages
        with:
          projectId: rest.projectId
          location: rest.location
        outputParameters:
        - type: object
          mapping: $.
    - path: /projects/{projectId}/locations/{location}/glossaries
      name: listglossaries
      operations:
      - method: GET
        name: listglossaries
        description: Google Cloud Translation List glossaries
        call: google-cloud-translation.listglossaries
        with:
          projectId: rest.projectId
          location: rest.location
        outputParameters:
        - type: object
          mapping: $.
    - path: /projects/{projectId}/locations/{location}/glossaries
      name: createglossary
      operations:
      - method: POST
        name: createglossary
        description: Google Cloud Translation Create a glossary
        call: google-cloud-translation.createglossary
        with:
          projectId: rest.projectId
          location: rest.location
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: google-cloud-translation-mcp
    transport: http
    description: MCP adapter for Google Cloud Translation API for AI agent use.
    tools:
    - name: translatetext
      description: Google Cloud Translation Translate text
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-translation.translatetext
      with:
        projectId: tools.projectId
        location: tools.location
      inputParameters:
      - name: projectId
        type: string
        description: projectId
        required: true
      - name: location
        type: string
        description: location
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: detectlanguage
      description: Google Cloud Translation Detect language
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-translation.detectlanguage
      with:
        projectId: tools.projectId
        location: tools.location
      inputParameters:
      - name: projectId
        type: string
        description: projectId
        required: true
      - name: location
        type: string
        description: location
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: getsupportedlanguages
      description: Google Cloud Translation Get supported languages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-cloud-translation.getsupportedlanguages
      with:
        projectId: tools.projectId
        location: tools.location
        displayLanguageCode: tools.displayLanguageCode
      inputParameters:
      - name: projectId
        type: string
        description: projectId
        required: true
      - name: location
        type: string
        description: location
        required: true
      - name: displayLanguageCode
        type: string
        description: displayLanguageCode
      outputParameters:
      - type: object
        mapping: $.
    - name: listglossaries
      description: Google Cloud Translation List glossaries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-cloud-translation.listglossaries
      with:
        projectId: tools.projectId
        location: tools.location
      inputParameters:
      - name: projectId
        type: string
        description: projectId
        required: true
      - name: location
        type: string
        description: location
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: createglossary
      description: Google Cloud Translation Create a glossary
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-translation.createglossary
      with:
        projectId: tools.projectId
        location: tools.location
      inputParameters:
      - name: projectId
        type: string
        description: projectId
        required: true
      - name: location
        type: string
        description: location
        required: true
      outputParameters:
      - type: object
        mapping: $.
